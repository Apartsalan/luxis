name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 46.225.115.216
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/luxis
            git pull origin main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            sleep 15
            echo "--- Migrations ---"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T backend python -m alembic upgrade head
            echo "--- Health Check (intern, via container) ---"
            docker exec luxis-backend python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" || exit 1
            echo " [backend OK]"
            echo "--- Health Check (extern, via Caddy) ---"
            curl -sf https://luxis.kestinglegal.nl/health > /dev/null || exit 1
            echo " [public OK]"
            echo "--- Status ---"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
