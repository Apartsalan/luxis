name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Lint ─────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: self-hosted
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Ruff check
        run: /usr/local/bin/uvx ruff check app/

  # ── Backend Tests ────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: self-hosted
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Start test services
        run: |
          docker run -d --name ci-postgres-${{ github.run_id }} \
            -e POSTGRES_USER=luxis -e POSTGRES_PASSWORD=luxis_test_password -e POSTGRES_DB=luxis_test \
            -p 5433:5432 --health-cmd "pg_isready -U luxis" --health-interval 5s --health-timeout 3s --health-retries 10 \
            postgres:16-alpine
          docker run -d --name ci-redis-${{ github.run_id }} \
            -p 6380:6379 --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10 \
            redis:7-alpine
          sleep 5

      - name: Create venv and install dependencies
        working-directory: backend
        run: |
          /usr/local/bin/uv venv .venv
          /usr/local/bin/uv pip install -p .venv/bin/python ".[dev]"

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://luxis:luxis_test_password@localhost:5433/luxis_test
          REDIS_URL: redis://localhost:6380/0
          SECRET_KEY: ci-test-secret-key-not-for-production
          APP_ENV: test
        run: .venv/bin/python -m alembic upgrade head

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://luxis:luxis_test_password@localhost:5433/luxis_test
          REDIS_URL: redis://localhost:6380/0
          SECRET_KEY: ci-test-secret-key-not-for-production
          APP_ENV: test
        run: .venv/bin/pytest tests/ -v --tb=short

      - name: Cleanup test services
        if: always()
        run: |
          docker rm -f ci-postgres-${{ github.run_id }} ci-redis-${{ github.run_id }} 2>/dev/null || true

  # ── Frontend Lint ────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: self-hosted
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  # ── Frontend Type Check ────────────────────────────────────────────────────
  frontend-typecheck:
    name: Frontend Type Check
    runs-on: self-hosted
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

  # ── Frontend Build ───────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: self-hosted
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ── Security Checks ─────────────────────────────────────────────────────────
  security:
    name: Security Checks
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Check for committed .env files
        run: |
          FOUND=0
          for f in .env backend/.env frontend/.env; do
            if [ -f "$f" ]; then
              echo "::error::$f found in repository — must not be committed"
              FOUND=1
            fi
          done
          if [ $FOUND -eq 1 ]; then exit 1; fi
          echo "No .env files committed"

      - name: Check for float in financial code
        run: |
          if grep -rn --include="*.py" "float(" backend/app/collections/ 2>/dev/null; then
            echo "::error::float() found in financial code — MUST use Decimal"
            exit 1
          fi
          echo "No float usage in financial code"
