name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Lint ─────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies (locked)
        run: |
          uv export --frozen --extra dev --no-emit-project -o requirements-dev.txt
          uv pip install --system -r requirements-dev.txt

      - name: Ruff check
        run: ruff check app/

  # ── Backend Tests ────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    continue-on-error: false
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: luxis
          POSTGRES_PASSWORD: luxis_test_password
          POSTGRES_DB: luxis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U luxis"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      # Mirrors backend/Dockerfile: the send-path tests render the S211
      # rente-bijlage PDF via LibreOffice headless (soffice). ubuntu-latest
      # no longer ships LibreOffice, so without this the suite fails with
      # FileNotFoundError: 'soffice' (red since 13 juli, S211/S212).
      - name: Install LibreOffice (PDF conversion on send path)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends libreoffice-writer

      - name: Install dependencies (locked)
        run: |
          uv export --frozen --extra dev --no-emit-project -o requirements-dev.txt
          uv pip install --system -r requirements-dev.txt
          uv pip install --system --no-deps .

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://luxis:luxis_test_password@localhost:5432/luxis_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-not-for-production-32chars!!
          ANTHROPIC_API_KEY: sk-ant-ci-test-fake-key-not-real
          APP_ENV: test
        run: pytest tests/ -v --tb=short

  # ── Frontend Lint ────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  # ── Frontend Type Check ────────────────────────────────────────────────────
  frontend-typecheck:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

  # ── Frontend Build ───────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ── Backend Dependency Audit ─────────────────────────────────────────────────
  # Blocking. Audits the locked *runtime* closure (pip-audit on the uv export).
  # pip/setuptools are not in the export, so their self-advisories (S161 noise)
  # never surface here. A vuln WITH a fix fails CI and must be addressed; to
  # accept an unfixable advisory, append `--ignore-vuln GHSA-xxxx` with a reason.
  backend-audit:
    name: Backend Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Export locked runtime requirements
        run: uv export --frozen --no-dev --no-emit-project -o requirements.txt

      - name: pip-audit (locked runtime deps)
        run: |
          uv pip install --system pip-audit
          pip-audit --requirement requirements.txt --progress-spinner off

  # ── Frontend Dependency Audit ────────────────────────────────────────────────
  # Non-blocking (informational): residual *moderate* advisories live inside
  # Next 15's own dependency tree and can only be "fixed" by downgrading Next
  # (rejected, S161). --audit-level=high flags only high/critical so a real
  # high-severity runtime issue is still loud, without failing CI on Next noise.
  frontend-audit:
    name: Frontend Dependency Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit (high+)
        run: npm audit --audit-level=high

  # ── Security Checks ─────────────────────────────────────────────────────────
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for committed .env files
        run: |
          FOUND=0
          for f in .env backend/.env frontend/.env; do
            if [ -f "$f" ]; then
              echo "::error::$f found in repository — must not be committed"
              FOUND=1
            fi
          done
          if [ $FOUND -eq 1 ]; then exit 1; fi
          echo "No .env files committed"

      - name: Check for float in financial code
        run: |
          if grep -rn --include="*.py" "float(" backend/app/collections/ 2>/dev/null; then
            echo "::error::float() found in financial code — MUST use Decimal"
            exit 1
          fi
          echo "No float usage in financial code"
