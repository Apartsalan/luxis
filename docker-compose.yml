services:
  db:
    image: postgres:16-alpine
    container_name: luxis-db
    environment:
      POSTGRES_USER: luxis
      POSTGRES_PASSWORD: luxis_dev_password
      POSTGRES_DB: luxis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luxis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: luxis-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: luxis-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://luxis:luxis_dev_password@db:5432/luxis
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-this-to-a-random-string-in-production
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      APP_ENV: development
      APP_DEBUG: "true"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SENTRY_DSN: ""
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Geen bind-mount van app/ + alembic/ hier: die lekten via de compose-merge
      # (union op mount-target) ongewild naar prod (COMPOSE_FILE=docker-compose.yml:
      # docker-compose.prod.yml), waardoor prod de git-werkkopie draaide i.p.v. de
      # image-code. Met uvicorn zonder --reload werd nieuwe code pas actief na een
      # handmatige restart (S168-valkuil). De hot-reload-mounts voor lokale dev staan
      # in docker-compose.dev.yml; prod draait nu image-baked, reproduceerbare code.
      - ./templates:/app/templates
      - generated_docs:/app/generated_docs
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: luxis-frontend
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  generated_docs:
  uploads:
