# Production overrides — use with:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Prerequisites:
# 1. Copy .env.production.example to .env.production and fill in real values
# 2. Generate SECRET_KEY: python -c "import secrets; print(secrets.token_urlsafe(64))"
# 3. Set a strong POSTGRES_PASSWORD

services:
  db:
    container_name: luxis-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    container_name: luxis-redis
    restart: unless-stopped

  backend:
    container_name: luxis-backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      APP_ENV: production
      APP_DEBUG: "false"
      CORS_ORIGINS: ${CORS_ORIGINS}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports: []  # Don't expose backend directly in production
    expose:
      - "8000"
    volumes:
      - generated_docs:/app/generated_docs
      - ./templates:/app/templates:ro
    restart: unless-stopped

  frontend:
    container_name: luxis-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports: []  # Don't expose frontend directly in production
    expose:
      - "3000"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: luxis-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  generated_docs:
  caddy_data:
  caddy_config:
