# Development overrides — use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  # Mailpit — local SMTP sink. Captures ALL outbound mail in its web UI
  # (http://localhost:8025) and NEVER forwards externally. Safety net for
  # send-path testing: real recipients can never be reached locally.
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # web UI
      - "1025:1025"   # SMTP
    restart: unless-stopped

  backend:
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/tests:/app/tests
      - ./templates:/app/templates
      - ./scripts:/app/scripts
    environment:
      # Route all SMTP into Mailpit (local sink — mail never leaves the machine)
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: audit@luxis.local
      SMTP_USE_TLS: "false"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    command: npm run dev
